name: Voice Assistant Bridge
version: "2.0.0"
slug: gemini_live_bridge
description: Multi-provider full-duplex voice assistant bridge (Gemini, OpenAI, Hybrid)
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
startup: application
boot: auto
homeassistant_api: true
ports:
  9872/tcp: 9872
options:
  provider: "gemini"
  gemini_api_key: ""
  openai_api_key: ""
  soniox_api_key: ""
  tts_api_key: ""
  llm_provider: "gemini"
  voice_name: "Zephyr"
  server_port: 9872
  log_level: "info"
  croatian_personality: true
  session_timeout_seconds: 300
schema:
  provider: list(gemini|openai|hybrid)
  gemini_api_key: str?
  openai_api_key: str?
  soniox_api_key: str?
  tts_api_key: str?
  llm_provider: list(gemini|openai|claude)?
  voice_name: str?
  server_port: int
  log_level: list(debug|info|warning|error)
  croatian_personality: bool
  session_timeout_seconds: int
