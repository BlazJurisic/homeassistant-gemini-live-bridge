name: Voice Assistant Bridge
version: "2.1.3"
slug: gemini_live_bridge
description: Multi-provider full-duplex voice assistant bridge for ESP32 devices
url: https://github.com/BlazJurisic/homeassistant-gemini-live-bridge
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
startup: application
boot: auto
homeassistant_api: true
ports:
  9872/tcp: 9872
options:
  provider: "gemini"
  gemini_api_key: ""
  gemini_voice: "Zephyr"
  openai_api_key: ""
  openai_voice: "alloy"
  server_port: 9872
  log_level: "info"
  croatian_personality: true
  session_timeout_seconds: 300
  hybrid_settings:
    soniox_api_key: ""
    tts_api_key: ""
    llm_provider: "gemini"
schema:
  provider: list(gemini|openai|hybrid)
  gemini_api_key: str?
  gemini_voice: list(Zephyr|Puck|Charon|Kore|Fenrir|Aoede)?
  openai_api_key: str?
  openai_voice: list(alloy|ash|ballad|coral|echo|sage|shimmer|verse)?
  server_port: int
  log_level: list(debug|info|warning|error)
  croatian_personality: bool
  session_timeout_seconds: int
  hybrid_settings:
    soniox_api_key: str?
    tts_api_key: str?
    llm_provider: list(gemini|openai)?
